<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=DM+Mono:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="calculator" role="application" aria-label="Calculator">

        <div class="header">
            <span class="header-label">Calculator</span>
            <span class="header-dot"></span>
        </div>

        <!-- Display Screen -->
        <div class="display" aria-live="polite" aria-atomic="true">
            <div class="display-history" id="history"></div>
            <div class="display-expr" id="expr"></div>
            <div class="display-main" id="main">0</div>
        </div>

        <!-- Main Button Grid -->
        <div class="btn-grid">

            <!-- Row 1: Functions + Divide -->
            <button class="btn fn clear" data-action="clear" aria-label="All Clear">AC</button>
            <button class="btn fn" data-action="sign" aria-label="Toggle sign">+/−</button>
            <button class="btn fn" data-action="percent" aria-label="Percent">%</button>
            <button class="btn op" data-op="÷" aria-label="Divide">÷</button>

            <!-- Row 2 -->
            <button class="btn" data-num="7">7</button>
            <button class="btn" data-num="8">8</button>
            <button class="btn" data-num="9">9</button>
            <button class="btn op" data-op="×" aria-label="Multiply">×</button>

            <!-- Row 3 -->
            <button class="btn" data-num="4">4</button>
            <button class="btn" data-num="5">5</button>
            <button class="btn" data-num="6">6</button>
            <button class="btn op" data-op="−" aria-label="Subtract">−</button>

            <!-- Row 4 -->
            <button class="btn" data-num="1">1</button>
            <button class="btn" data-num="2">2</button>
            <button class="btn" data-num="3">3</button>
            <button class="btn op" data-op="+" aria-label="Add">+</button>

            <!-- Row 5 -->
            <button class="btn zero" data-num="0">0</button>
            <button class="btn" data-action="dot" aria-label="Decimal point">.</button>
            <button class="btn eq" data-action="equals" aria-label="Equals">=</button>

        </div>

        <!-- Extra / Scientific Operations -->
        <div class="extras">
            <button class="xbtn" data-action="sqrt" aria-label="Square root">√x</button>
            <button class="xbtn" data-action="square" aria-label="Square">x²</button>
            <button class="xbtn" data-action="inverse" aria-label="Inverse">1/x</button>
            <button class="xbtn" data-action="backspace" aria-label="Backspace">⌫ del</button>
        </div>

        <p class="hint">
            Keyboard: <kbd>0–9</kbd> <kbd>+ − * /</kbd> <kbd>Enter</kbd> <kbd>Esc</kbd> <kbd>⌫</kbd>
        </p>

    </div>

    <script src="script.js"></script>
</body>

</html>
